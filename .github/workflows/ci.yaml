---
name: CI

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --dev --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run basedpyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --dev --frozen
      - name: Run tests
        run: uv run pytest --cov=metaculus_bot

  # Scan uv.lock for known vulnerabilities. osv-scanner is a Go binary (not a
  # PyPI package), so it runs via Google's published container action rather
  # than uvx.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=uv.lock
