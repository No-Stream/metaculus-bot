name: Test Bot

on:
  workflow_dispatch:

# Add concurrency group to prevent parallel runs
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false


# Daily job to run the simple forecast bot
jobs:
  forecast_job:
    runs-on: ubuntu-latest # determines the machine that will run the job - keep as is
    steps: # sets up the steps that will be run in order
      # setup repository with all necessary dependencies - keep as is
      - name: Check out repository
        uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Run bot
        run: |
          uv run python main.py --mode test_questions
        # this reads the environment variables from the github repository.
        # Store under Settings --> Secrets and variables --> Actions
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }} # replace this with the name of the variable under which you stored your own Metaculus token
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OAI_ANTH_OPENROUTER_KEY: ${{ secrets.OAI_ANTH_OPENROUTER_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          ASKNEWS_MAX_CONCURRENCY: '1'
          ASKNEWS_MAX_RPS: '0.2'
          # Native search runs in parallel with AskNews; model defaults to
          # openai/gpt-5.5 (medium effort, verbosity=low, 360s) per constants.py.
          NATIVE_SEARCH_ENABLED: 'true'
          FINANCIAL_DATA_ENABLED: 'true'
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Gemini grounded search (Google AI Studio SDK) adds a 3rd distinct source.
          # GOOGLE_API_KEY is the operator's personal Google AI Studio key (stored
          # in CI as secrets.GEMINI_API_KEY). The grounded-search side has no
          # donated/shared path — Google AI Studio doesn't offer one.
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_SEARCH_ENABLED: 'true'
          # OpenRouter Gemini routing (forecaster, stacker, summarizer when the
          # ensemble includes a Google model). When 'true' (default since
          # 2026-06-16), Gemini OpenRouter calls prefer the Metaculus-donated
          # OAI_ANTH_OPENROUTER_KEY wrapper with personal-key fallback. On because
          # Metaculus raised the Google rate limits — the donated key serves most
          # Gemini now; gemini-3.1-pro-preview is pinned to the personal key
          # (DONATED_KEY_BLOCKED_GOOGLE_MODELS blocklist; no donated attempt, no
          # 429) pending the Metaculus BYOK fix.
          GEMINI_USE_DONATED_OPENROUTER_KEY: 'true'
          # Second-pass gap-fill: analyzer identifies gaps in first-pass research,
          # parallel grounded Gemini searches resolve each. Fails soft.
          GAP_FILL_ENABLED: 'true'
          # Prediction-market snapshot provider: Polymarket + Kalshi + Manifold.
          # Manual workflow_dispatch runs use this for end-to-end testing in prod
          # mode (is_benchmarking=False).
          PREDICTION_MARKETS_ENABLED: 'true'
          # Stacking disabled on all types (ablation: stacker <= median on binary,
          # hurts numeric CRPS; stacker base model is a weak binary forecaster).
          NUMERIC_STACKING_ENABLED: 'false'
          BINARY_STACKING_ENABLED: 'false'
          MC_STACKING_ENABLED: 'false'
          OPENAI_AGENTS_DISABLE_TRACING: 'true'
