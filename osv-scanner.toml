# osv-scanner ignore-list for uv.lock vulnerability scanning (`make audit` + CI audit job).
#
# These advisories are all in transitive dependencies pinned by the FROZEN
# `forecasting-tools==0.2.54` (which exact-pins litellm 1.80.0 and pulls
# cryptography/pillow/pydantic-settings/transformers via asknews / google-auth /
# mcp / openai-agents). The fixed versions are unreachable without upgrading
# forecasting-tools, which is deliberately frozen for behavioral stability.
# See FUTURE.md "Dependency CVEs gated by the frozen forecasting-tools pin".
#
# The scan stays LIVE for any NEW CVE not listed here — only these enumerated,
# accepted advisories are suppressed. Re-evaluate this whole list whenever
# forecasting-tools is upgraded (re-run `make audit` and prune resolved IDs).
#
# review-by: 2026-09-19  (re-audit this list quarterly or at the next
#            forecasting-tools bump, whichever comes first)

# Note: PYSEC-2026-35/-36 (cryptography) and PYSEC-2026-165 (pillow) are aliases
